<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f0eb;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --accent: #e86a33;
      --accent-hover: #d45a25;
      --border: #e0dbd5;
      --success: #2d8a4e;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 48px 24px 80px; }
    header { text-align: center; margin-bottom: 48px; }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.4rem; font-weight: 400;
      margin-bottom: 8px; letter-spacing: -0.5px;
    }
    header p { color: var(--text-muted); font-size: 1.05rem; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px;
      margin-bottom: 24px; box-shadow: var(--shadow);
    }
    .card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.35rem; font-weight: 400; margin-bottom: 20px;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block; font-weight: 500; font-size: 0.85rem;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-muted); margin-bottom: 6px;
    }
    input[type="text"], textarea {
      width: 100%; padding: 12px 16px;
      border: 1px solid var(--border); border-radius: 8px;
      font-family: inherit; font-size: 1rem;
      background: var(--bg); color: var(--text);
      transition: border-color 0.2s; outline: none;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; border: none; border-radius: 8px;
      font-family: inherit; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .file-upload-area {
      border: 2px dashed var(--border); border-radius: 8px;
      padding: 24px; text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s; margin-bottom: 16px;
    }
    .file-upload-area:hover { border-color: var(--accent); background: rgba(232,106,51,0.04); }
    .file-upload-area p { color: var(--text-muted); font-size: 0.95rem; }
    .file-upload-area .filename { color: var(--accent); font-weight: 600; margin-top: 8px; }
    input[type="file"] { display: none; }
    .tabs {
      display: flex; gap: 4px; margin-bottom: 24px;
      background: var(--bg); padding: 4px; border-radius: 8px;
    }
    .tab {
      flex: 1; padding: 10px 16px; border: none; border-radius: 6px;
      font-family: inherit; font-size: 0.9rem; font-weight: 500;
      cursor: pointer; background: transparent; color: var(--text-muted);
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--surface); color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .feedback-list { list-style: none; }
    .feedback-item {
      padding: 20px 0; border-bottom: 1px solid var(--border);
      animation: fadeIn 0.3s ease;
    }
    .feedback-item:last-child { border-bottom: none; }
    .feedback-item .meta {
      display: flex; align-items: center; gap: 12px; margin-bottom: 6px;
    }
    .feedback-item .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
    }
    .feedback-item .name { font-weight: 600; font-size: 0.95rem; }
    .feedback-item .time { color: var(--text-muted); font-size: 0.8rem; margin-left: auto; }
    .badge {
      font-size: 0.7rem; padding: 2px 8px; border-radius: 4px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-form { background: #e8f4ec; color: var(--success); }
    .badge-doc { background: #fff3e0; color: #e65100; }
    .feedback-item .text { color: var(--text); font-size: 0.95rem; padding-left: 48px; }
    .feedback-item .rating { padding-left: 48px; margin-top: 4px; font-size: 0.85rem; color: var(--text-muted); }
    .empty { text-align: center; padding: 40px 0; color: var(--text-muted); }
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text); color: #fff;
      padding: 12px 24px; border-radius: 8px;
      font-size: 0.9rem; font-weight: 500; opacity: 0;
      transition: all 0.3s ease; z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 600px) {
      .container { padding: 24px 16px 60px; }
      header h1 { font-size: 1.8rem; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Product Feedback</h1>
      <p>Help us improve — share your thoughts or upload a feedback document.</p>
    </header>

    <div class="card">
      <h2>Submit Feedback</h2>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('form')">Write Feedback</button>
        <button class="tab" onclick="switchTab('upload')">Upload Document</button>
      </div>

      <div id="tab-form" class="tab-content active">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" placeholder="e.g. Rahul Sharma" />
        </div>
        <div class="form-group">
          <label for="feedback">Feedback</label>
          <textarea id="feedback" placeholder="Tell us what you think..."></textarea>
        </div>
        <button class="btn btn-primary" id="submitBtn" onclick="submitFeedback()">Submit Feedback</button>
      </div>

      <div id="tab-upload" class="tab-content">
        <div class="file-upload-area" onclick="document.getElementById('fileInput').click()">
          <p>Click to select a <strong>.txt</strong> file</p>
          <p class="filename" id="fileName"></p>
        </div>
        <input type="file" id="fileInput" accept=".txt" onchange="showFileName()" />
        <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:16px;">
          Expected format: <code>Name: ...</code> / <code>Feedback: ...</code> / <code>Rating: ...</code>
        </p>
        <button class="btn btn-primary" id="uploadBtn" onclick="uploadFile()">Upload &amp; Process</button>
      </div>
    </div>

    <div class="card">
      <h2>All Feedback</h2>
      <ul class="feedback-list" id="list">
        <li class="empty">Loading feedback...</li>
      </ul>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = "/api/feedback";
    const UPLOAD_URL = "/api/upload";

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      if (tab === 'form') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('tab-form').classList.add('active');
      } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('tab-upload').classList.add('active');
      }
    }

    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isError ? '#c0392b' : '#1a1a1a';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function submitFeedback() {
      const name = document.getElementById("name").value.trim();
      const feedback = document.getElementById("feedback").value.trim();
      if (!name || !feedback) { showToast("Please fill in both fields.", true); return; }
      const btn = document.getElementById("submitBtn");
      btn.disabled = true; btn.textContent = "Submitting...";
      try {
        const res = await fetch(API_BASE, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, feedback })
        });
        if (!res.ok) throw new Error("API error");
        document.getElementById("name").value = "";
        document.getElementById("feedback").value = "";
        showToast("Feedback submitted!");
        loadFeedback();
      } catch (e) {
        showToast("Failed to submit. Check console.", true);
        console.error(e);
      } finally {
        btn.disabled = false; btn.textContent = "Submit Feedback";
      }
    }

    function showFileName() {
      const file = document.getElementById("fileInput").files[0];
      document.getElementById("fileName").textContent = file ? file.name : "";
    }

    async function uploadFile() {
      const file = document.getElementById("fileInput").files[0];
      if (!file) { showToast("Please select a file first.", true); return; }
      const btn = document.getElementById("uploadBtn");
      btn.disabled = true; btn.textContent = "Processing...";
      try {
        const text = await file.text();
        const res = await fetch(UPLOAD_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: text
        });
        if (!res.ok) throw new Error("API error");
        document.getElementById("fileInput").value = "";
        document.getElementById("fileName").textContent = "";
        showToast("Document processed!");
        loadFeedback();
      } catch (e) {
        showToast("Upload failed. Check console.", true);
        console.error(e);
      } finally {
        btn.disabled = false; btn.textContent = "Upload & Process";
      }
    }

    async function loadFeedback() {
      const list = document.getElementById("list");
      try {
        const res = await fetch(API_BASE);
        const data = await res.json();
        if (!data.length) {
          list.innerHTML = '<li class="empty">No feedback yet. Be the first!</li>';
          return;
        }
        data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        list.innerHTML = data.map(item => {
          const initials = (item.name || "?").split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
          const time = item.timestamp ? new Date(item.timestamp).toLocaleDateString('en-IN', {
            day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
          }) : '';
          const isDoc = item.type === 'document';
          const badge = isDoc
            ? '<span class="badge badge-doc">Document</span>'
            : '<span class="badge badge-form">Form</span>';
          const rating = item.rating ? '<div class="rating">Rating: ' + item.rating + '</div>' : '';
          return '<li class="feedback-item">' +
            '<div class="meta">' +
              '<div class="avatar">' + initials + '</div>' +
              '<span class="name">' + (item.name || 'Anonymous') + '</span>' +
              badge +
              '<span class="time">' + time + '</span>' +
            '</div>' +
            '<div class="text">' + (item.feedback || '') + '</div>' +
            rating +
          '</li>';
        }).join('');
      } catch (e) {
        list.innerHTML = '<li class="empty">Could not load feedback. Is the API running?</li>';
        console.error(e);
      }
    }

    loadFeedback();
  </script>
</body>
</html>
